site_name: "NLvib — Nonlinear Vibration Analysis Toolbox"
site_description: "Python port of NLvib: harmonic balance, shooting, arc-length continuation for nonlinear mechanical systems."
site_author: "NLvib Contributors"
repo_url: https://github.com/nlvib/nlvib-python

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - toc.integrate
    - search.suggest

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            docstring_style: google
            show_source: true
            show_root_heading: true
            show_submodules: false

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - User Guide:
      - Nonlinear Elements: user-guide/nonlinear-elements.md
      - Mechanical Systems: user-guide/mechanical-systems.md
      - Harmonic Balance: user-guide/harmonic-balance.md
      - Shooting Method: user-guide/shooting-method.md
      - Continuation: user-guide/continuation.md
      - Visualization: user-guide/visualization.md
  - Examples:
      - Overview: examples/index.md
      - Canonical Examples: examples.md
  - API Reference:
      - Nonlinear Elements: api/nonlinearities.md
      - Mechanical Systems: api/systems.md
      - Solvers: api/solvers.md
      - Continuation: api/continuation.md
      - CMS Reduction: api/cms.md
      - Visualization: api/visualization.md
      - IO: api/io.md
      - Utilities: api/utils.md
  - Validation: validation.md
  - Differences from MATLAB: differences-from-matlab.md
  - Contributing: contributing.md

markdown_extensions:
  - admonition
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - toc:
      permalink: true
